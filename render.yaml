services:
  - type: web
    name: pss14-stress-predictor
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs || true
      cd frontend && npm install && npm run build && cd ..
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

